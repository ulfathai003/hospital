# Production Docker Compose Orchestration for Enterprise HMS + CRM Suite
version: '3.8'

services:
  # 1. Primary PostgreSQL production database
  postgres:
    image: postgres:16-alpine
    container_name: hms-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: hms_admin
      POSTGRES_PASSWORD: SecretHMSSecurePassword2026
      POSTGRES_DB: hms_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - hms-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_admin -d hms_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis memory cache for fast pub/sub notification processing
  redis:
    image: redis:7-alpine
    container_name: hms-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - hms-prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Enterprise Backend API (NestJS styled Node process)
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-backend-api-prod
    restart: always
    command: node dist/server.cjs
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hms_admin:SecretHMSSecurePassword2026@postgres:5432/hms_production?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=HMSSecureCoreSecretToken2026KeyForAccessValidation
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hms-prod-net

  # 4. Client Web Interface (Single Page Application layer)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend-api:3000
    depends_on:
      - backend-api
    networks:
      - hms-prod-net

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  hms-prod-net:
    driver: bridge
