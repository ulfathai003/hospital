# Development Docker Compose Orchestration for HMS + CRM Suite
version: '3.8'

services:
  # 1. Primary PostgreSQL development database
  postgres-dev:
    image: postgres:16-alpine
    container_name: hms-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: hms_dev_user
      POSTGRES_PASSWORD: DevHMSSecurePassword2477
      POSTGRES_DB: hms_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - hms-dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_dev_user -d hms_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis memory cache for developer event bus
  redis-dev:
    image: redis:7-alpine
    container_name: hms-redis-dev
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - hms-dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3

  # 3. Dynamic Node Backend Developer process
  backend-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-backend-api-dev
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://hms_dev_user:DevHMSSecurePassword2477@postgres-dev:5432/hms_development?schema=public
      - REDIS_URL=redis://redis-dev:6379
      - JWT_SECRET=DevSecretHMSSecurePasswordCheck
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    networks:
      - hms-dev-net

  # 4. Developer Client Frontend server
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-frontend-dev
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend-api-dev:3000
    depends_on:
      - backend-api-dev
    networks:
      - hms-dev-net

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  hms-dev-net:
    driver: bridge
